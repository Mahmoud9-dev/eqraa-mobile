<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>إقراء</title>
    <meta name="description" content="إقراء - لتحفيظ القرآن الكريم والعلوم الإسلامية" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Persist language direction from localStorage before first paint
      (function () {
        try {
          var lang = localStorage.getItem("eqraa-language");
          if (lang === "en" || lang === "ar") {
            document.documentElement.setAttribute("lang", lang);
            document.documentElement.setAttribute(
              "dir",
              lang === "ar" ? "rtl" : "ltr"
            );
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="font-arabic">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
